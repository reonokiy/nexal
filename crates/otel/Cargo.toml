[package]
name = "nexal-otel"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
doctest = false
name = "nexal_otel"
path = "src/lib.rs"

[lints]
workspace = true

[features]
## Disables the built-in default metrics exporter.
##
## Intended for use from `dev-dependencies` so unit/integration tests never
## attempt to export metrics over the network.
disable-default-metrics-exporter = []

[dependencies]
nexal-utils-absolute-path = { workspace = true }
nexal-utils-string = { workspace = true }
nexal-app-server-protocol = { workspace = true }
nexal-protocol = { workspace = true }
nexal-api = { workspace = true }
eventsource-stream = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
strum_macros = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
reqwest = { workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
