[package]
name = "nexal"
version.workspace = true
edition.workspace = true
default-run = "nexal"

[[bin]]
name = "nexal"
path = "src/main.rs"

[features]
default = ["tui"]
tui = ["nexal-tui"]
embedded-agent = ["dirs"]

[dependencies]
nexal-config = { workspace = true }
nexal-agent = { workspace = true }
dirs = { workspace = true, optional = true }
nexal-state = { workspace = true }
nexal-channel-core = { workspace = true }
nexal-channel-telegram = { workspace = true }
nexal-channel-discord = { workspace = true }
nexal-channel-http = { workspace = true }
nexal-channel-heartbeat = { workspace = true }
nexal-channel-cron = { workspace = true }

nexal-arg0 = { workspace = true }
nexal-config-loader = { workspace = true }
nexal-exec-server = { workspace = true }
nexal-tui = { workspace = true, optional = true }

anyhow = { workspace = true }
bollard = { workspace = true }
bytes = { workspace = true }
clap = { workspace = true }
dotenvy = "0.15"
libc = { workspace = true }
tar = { workspace = true }
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true }
opentelemetry-otlp = { workspace = true }
reqwest = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-opentelemetry = { workspace = true }
tracing-subscriber = { workspace = true }
