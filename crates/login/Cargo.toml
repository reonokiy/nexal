[package]
name = "nexal-login"
version.workspace = true
edition.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies]
chrono = { workspace = true, features = ["serde"] }
nexal-app-server-protocol = { workspace = true }
nexal-client = { workspace = true }
nexal-config-loader = { workspace = true }
nexal-keyring-store = { workspace = true }
nexal-protocol = { workspace = true }
nexal-terminal-detection = { workspace = true }
once_cell = { workspace = true }
os_info = { workspace = true }
reqwest = { workspace = true, features = ["json", "blocking"] }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
tokio = { workspace = true, features = [
    "io-std",
    "macros",
    "process",
    "rt-multi-thread",
    "signal",
] }
tracing = { workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
core_test_support = { workspace = true }
wiremock = { workspace = true }
