[package]
name = "nexal-tui-render"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "nexal_tui_render"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
nexal-ansi-escape = { workspace = true }
nexal-git-utils = { workspace = true }
nexal-protocol = { workspace = true }
nexal-terminal-detection = { workspace = true }
nexal-utils-path = { workspace = true }
nexal-utils-string = { workspace = true }

crossterm = { workspace = true }
diffy = { workspace = true }
dirs = { workspace = true }
pathdiff = { workspace = true }
pulldown-cmark = { workspace = true }
ratatui = { workspace = true, features = [
    "unstable-rendered-line-info",
    "unstable-widget-ref",
] }
regex-lite = { workspace = true }
serde_json = { workspace = true, features = ["preserve_order"] }
supports-color = { workspace = true }
syntect = "5"
textwrap = { workspace = true }
tracing = { workspace = true, features = ["log"] }
two-face = { version = "0.5", default-features = false, features = ["syntect-default-onig"] }
unicode-segmentation = { workspace = true }
unicode-width = { workspace = true }
url = { workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
