[package]
edition.workspace = true
license.workspace = true
name = "nexal-analytics"
version.workspace = true

[lib]
doctest = false
name = "nexal_analytics"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
nexal-git-utils = { workspace = true }
nexal-login = { workspace = true }
nexal-plugin = { workspace = true }
nexal-protocol = { workspace = true }
serde = { workspace = true, features = ["derive"] }
sha1 = { workspace = true }
tokio = { workspace = true, features = [
    "macros",
    "rt-multi-thread",
] }
tracing = { workspace = true, features = ["log"] }

[dev-dependencies]
pretty_assertions = { workspace = true }
serde_json = { workspace = true }
